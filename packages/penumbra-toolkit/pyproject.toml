[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "penumbra-toolkit"
version = "0.1.0"
description = "Probabilistic space-weather driver forecasting: F10.7 and Kp forecasts with walk-forward-calibrated uncertainty bands, plus orbital-drag translation — pure Python."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
authors = [{ name = "Ashutosh", email = "siddhashutosh@gmail.com" }]
keywords = [
  "space-weather", "forecasting", "uncertainty-quantification", "f10.7",
  "solar-flux", "kp-index", "geomagnetic", "calibration", "orbital-drag", "SSA",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Astronomy",
  "Topic :: Scientific/Engineering :: Atmospheric Science",
  "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
  "numpy>=1.24",
  "python-dateutil>=2.9",
]

[project.urls]
Homepage = "https://github.com/siddhashutosh/penumbra"
Documentation = "https://github.com/siddhashutosh/penumbra/tree/main/documents"
Issues = "https://github.com/siddhashutosh/penumbra/issues"

[tool.setuptools]
packages = ["penumbra_toolkit"]
