name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - name: Run tests (demo mode enforced)
        run: python -m pytest backend/tests -q
        env:
          PYTHONPATH: backend

  toolkit-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify package is in sync with backend logic
        run: python packages/sync.py --check
      - name: Build wheel
        run: |
          pip install build
          python -m build packages/penumbra-toolkit
      - name: Smoke-test install
        run: |
          pip install packages/penumbra-toolkit/dist/*.whl
          python -c "from penumbra_toolkit import forecast, walk_forward_errors; print('toolkit ok')"

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          npm ci --prefix ui
          npm run build --prefix ui
